name: Update disposable email domains

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Bump extension version and generate upgrade if blocklist changed
        run: node scripts/bump_email_guard_version.js

      - name: Commit and push changes
        id: commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add email_guard/*.sql email_guard/email_guard.control email_guard/README.md scripts/bump_email_guard_version.js
            git commit -m "chore(email_guard): refresh blocklist and bump version if needed"
            git push
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit"
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dbdev CLI
        if: steps.commit.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(curl -fsSL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/supabase/dbdev/releases/latest" \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -fsSL "https://github.com/supabase/dbdev/releases/download/${LATEST}/dbdev-${LATEST}-linux-amd64.tar.gz" \
            | tar -xzf - -C /tmp
          sudo install -m 755 /tmp/dbdev /usr/local/bin/dbdev

      - name: Publish to database.dev
        if: steps.commit.outputs.changes == 'true'
        env:
          DBDEV_TOKEN: ${{ secrets.DBDEV_TOKEN }}
        run: |
          mkdir -p ~/.dbdev
          (umask 077 && printf '[registries.dbdev]\ntoken = "%s"\n' "$DBDEV_TOKEN" > ~/.dbdev/credentials.toml)
          dbdev publish --path email_guard
          rm -f ~/.dbdev/credentials.toml
