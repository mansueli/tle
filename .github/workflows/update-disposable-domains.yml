name: Update disposable email domains

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Bump extension version and generate upgrade if blocklist changed
        run: node scripts/bump_email_guard_version.js

      - name: Detect changes
        id: detect-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.detect-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add email_guard/*.sql email_guard/email_guard.control email_guard/README.md scripts/bump_email_guard_version.js
          git commit -m "chore(email_guard): refresh blocklist and bump version if needed"
          git push

      - name: Install dbdev CLI
        if: steps.detect-changes.outputs.changed == 'true'
        run: brew install supabase/tap/dbdev

      - name: Authenticate dbdev
        if: steps.detect-changes.outputs.changed == 'true'
        env:
          DBDEV_TOKEN: ${{ secrets.DBDEV_TOKEN }}
        run: |
          if [ -z "$DBDEV_TOKEN" ]; then
            echo "Error: DBDEV_TOKEN secret is not set" >&2
            exit 1
          fi
          mkdir -p ~/.dbdev
          cat > ~/.dbdev/config.toml << 'EOF'
          [registries.dbdev]
          base_url = "https://api.database.dev/"

          [registry]
          default = "dbdev"
          EOF
          printf '[registries.dbdev]\ntoken = "%s"\n' "$DBDEV_TOKEN" > ~/.dbdev/credentials.toml

      - name: Publish to database.dev
        if: steps.detect-changes.outputs.changed == 'true'
        run: dbdev publish --path email_guard
